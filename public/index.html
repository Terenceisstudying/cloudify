<style>
    /* MODIFIED: Global scroll lock to prevent iOS "rubber-band" bounce */
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; 
        position: fixed; 
        /* touch-action: none should NOT be here */
    }

    /* Allow internal scrolling only on screens that need it (like results/onboarding) */
    main.screen {
        width: 100%;
        height: 100%;
        overflow-y: auto !important; /* Force scroll */
        -webkit-overflow-scrolling: touch;
    }

    /* Top Banner Styles */
    .top-banner {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background-color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        z-index: 10005; 
    }
    
    /* ... rest of your styles ... */
</style>
