<h1>CRC Risk Awareness by SCS</h1>
<p>Come, answer some questions, we check your risk level for you! Prizes to be won after completion!</p>
<form id="onboarding-form">
    <!-- 1. Age Selection (Input + Slider) -->
    <div class="form-group">
        <label for="age-input">1. What is your age? <span class="required">*</span></label>
        <div class="age-selection-container">
            <input type="number" id="age-input" name="age" min="18" max="100" placeholder="Age" required>
            <div class="slider-wrapper">
                <input type="range" id="age-slider" min="18" max="100" value="18" class="age-slider">
                <div class="slider-labels">
                    <span>18</span>
                    <span>100</span>
                </div>
            </div>
        </div>
    </div>
    <!-- 2. Sex Selection -->
    <div class="form-group">
        <label>2. What is your sex at birth? <span class="required">*</span></label>
        <div class="radio-group">
            <input type="radio" id="sex-male" name="sex" value="Male" required>
            <label for="sex-male">Male</label>
            <input type="radio" id="sex-female" name="sex" value="Female" required>
            <label for="sex-female">Female</label>
        </div>
    </div>

    <!-- 3. Family History -->
    <div class="form-group">
        <label>3. Has a close relative (parent, sibling, child) had colorectal cancer? <span
                class="required">*</span></label>
        <div class="radio-group">
            <input type="radio" id="family-history-yes" name="family-history" value="Yes" required>
            <label for="family-history-yes">Yes</label>
            <input type="radio" id="family-history-no" name="family-history" value="No" required>
            <label for="family-history-no">No</label>
            <input type="radio" id="family-history-unknown" name="family-history" value="Unknown" required>
            <label for="family-history-unknown">Don't Know</label>
        </div>
    </div>
    <button type="submit" id="start-game-btn" disabled>Start Assessment</button>
</form>
